# Configuration file for multi-layer perceptron (MLP) model settings
# This file contains settings for the MLP model used in the analysis.
# Ensure that the file paths are correct and accessible.
# Configuration file for MLP model settings
hyperparameters:
  input_size: 5         # Number of input features
  hidden_sizes: [32, 16]
  output_size: 1
  dropout: 0.2
  activation: relu

training:
  epochs: 100
  batch_size: 32
  lr: 0.001
  loss_fn: BCEWithLogitsLoss
  optimizer: Adam