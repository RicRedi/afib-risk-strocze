# Configuration file for correlation analysis

# Independent variables to be used in the analysis
independent_continuous_variables:
  - BMI
  - Časový odstup od iCMP/TIA
  - Rozměr levé síně
  - Enddiastolický rozměr levé komory (LVEDD)
  - Interventrikulární septum (IVS)
  - Zadní stěna levé komory (Inferolat.)
  - Ejekční frakce levé komory (LVEF)
  - Celkový cholesterol
  - LDL
  - HDL
  - TAG
  - eGFR
  - Sérový kreatinin
  - SVES - počet záznamů 
  - KES - počet záznamů
  - CHA₂DS₂-VASc
  - NIHSS vstupní
  - Věk při iCMP/TIA
  - SVES

# Independent categorical variables
independent_binary_variables:
  - Kuřák v době vzniku příznaků iCMP/TIA
  - Abusus alkoholu
  - Osobní anamnéza (choice=Hyperlipidémie)
  - Pohlaví
  - Typ akutní ischemie (choice=Teritoriální)
  - Typ akutní ischemie (choice=Lakunární)
  - Typ akutní ischemie (choice=Borderzone)
  - Typ akutní ischemie (choice=Ischemie nezachycena)
  - Staré postischemické změny (choice=Nejsou)
  - Staré postischemické změny (choice=Ve stejném povodí jako akutní ischemie)
  - Staré postischemické změny (choice=V jiném povodí než akutní ischemie)
  - Staré postischemické změny (choice=Difuzně v bílé hmotě)

# Independent categorical variables with multiple categories
reference_var: Záchyt FiS MDT celkově
# reference_var: Vstupní událost - indikace MDT EKG monitorace

model_features:
  - CHA₂DS₂-VASc
  # - Ejekční frakce levé komory (LVEF)
  # - HDL
  # - TAG

conditions:
  cond1:
    col: Záchyt FiS MDT celkově
    op: "=="
    value: 1

logic: cond1