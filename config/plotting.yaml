# Configuration file for plotting settings
# This file contains settings for plotting the results of the analysis.
# Ensure that the file paths are correct and accessible.

# Saving plots settings
save_plots: True
save_path: ./results/plots
dpi: 300
# Show plots in the notebook or script
show_plots: True
block_plots: False

# Plotting settings
figsize:
  width: 12
  height: 8

# Fontsize settings for plots
fontsize:
  title: 16
  xlabel: 14
  ylabel: 14
  legend: 12
  tick: 12
  tree: 10
